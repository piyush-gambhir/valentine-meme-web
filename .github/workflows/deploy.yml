# Cloudflare Pages deployment workflow.
#
# Currently DISABLED for automatic triggers — only fires when manually run from
# the GitHub UI. To enable on push, uncomment the `push:` block below.

name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - development
  # push:
  #   branches: [main]

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'production' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Deploy
        run: |
          cat > ".env.deploy.${ENV}" <<EOF
          CLOUDFLARE_ACCOUNT_ID=${CLOUDFLARE_ACCOUNT_ID}
          CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
          CF_PROJECT_NAME=${CF_PROJECT_NAME}
          EOF
          bash scripts/deploy.sh "$ENV"
        env:
          ENV: ${{ inputs.environment || 'production' }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_PROJECT_NAME: ${{ vars.CF_PROJECT_NAME }}
